<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  {{robots_meta}}
  <title>{{title}}</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #141925;
      --panel-soft: #181e2d;
      --text: #d6deeb;
      --dim: #8a94a6;
      --border: #283247;
      --accent: #82aaff;
      --accent-2: #c792ea;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 900px;
      margin: 2.25rem auto;
      padding: 0 1.1rem;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.2rem;
      background: var(--panel);
    }
    pre {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      overflow-x: auto;
    }
    code {
      font-family: inherit;
      color: var(--accent-2);
    }
    h1, h2, h3 {
      color: #e5ecf8;
      line-height: 1.3;
      margin-top: 1.6rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    nav {
      margin-bottom: 1.2rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
    }
    nav > a {
      display: inline-block;
      margin-right: 1.15rem;
    }
    .breadcrumbs {
      font-size: 0.9em;
      margin-bottom: 1.2rem;
      color: var(--dim);
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    .breadcrumbs a { color: var(--text); }
    .breadcrumbs > * + *::before { content: " › "; color: var(--dim); }
    .blog-list {
      display: grid;
      gap: 0.9rem;
      margin-top: 1rem;
    }
    .post-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 0.9rem 1rem;
    }
    .card-title {
      margin: 0 0 0.25rem;
      font-size: 1.08rem;
    }
    .card-subheading {
      margin: 0 0 0.4rem;
      color: var(--accent-2);
      font-size: 0.95rem;
    }
    .card-tags,
    .post-tags,
    .blog-tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      margin: 0.6rem 0 0;
    }
    .blog-tag-filters {
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
    }
    .blog-tag-filters > span {
      color: var(--dim);
      margin-right: 0.3rem;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.18rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 0.84rem;
      line-height: 1.4;
      white-space: nowrap;
    }
    .tag-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f1117;
      font-weight: 700;
    }
    .card-excerpt {
      margin: 0;
      color: var(--dim);
      font-size: 0.95rem;
    }
    .blog-post .post-header {
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
    }
    .blog-post .post-title {
      margin: 0;
    }
    .blog-post .post-subheading {
      margin: 0.45rem 0 0;
      color: var(--accent-2);
      font-size: 1rem;
    }
    .blog-post .post-tags {
      margin-top: 0.7rem;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 1rem;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
    }
    .page-link {
      color: var(--accent);
      white-space: nowrap;
    }
    .page-current {
      color: var(--dim);
      font-size: 0.9rem;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  {{nav}}
  {{breadcrumbs}}
  {{content}}
</body>
</html>
