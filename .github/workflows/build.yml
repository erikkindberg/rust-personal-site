name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout private content
        uses: actions/checkout@v4
        with:
          repository: erikkindberg/rust-personal-site-content
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./content-private

      - name: Move content into place
        run: |
          mv content-private/content ./content || true
          mv content-private/templates ./templates || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build site
        env:
          BASE_URL: /${{ github.event.repository.name }}
          NOINDEX: "1"
        run: cargo run --release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
