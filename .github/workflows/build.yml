name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout private content
        uses: actions/checkout@v4
        with:
          repository: erikkindberg/rust-personal-site-content
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./content-private

      - name: Move content into place
        run: |
          if [ ! -d content-private/content ]; then
            echo "Missing content-private/content in private repo"
            exit 1
          fi

          mv content-private/content ./content

          if [ -d content-private/templates ]; then
            mv content-private/templates ./templates
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build site
        env:
          BASE_URL: /${{ github.event.repository.name }}
          NOINDEX: "1"
        run: cargo run --release

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
