<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>About</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #141925;
      --panel-soft: #181e2d;
      --text: #d6deeb;
      --dim: #8a94a6;
      --border: #283247;
      --accent: #82aaff;
      --accent-2: #c792ea;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 900px;
      margin: 2.25rem auto;
      padding: 0 1.1rem;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.2rem;
      background: var(--panel);
    }
    pre {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      overflow-x: auto;
    }
    code {
      font-family: inherit;
      color: var(--accent-2);
    }
    h1, h2, h3 {
      color: #e5ecf8;
      line-height: 1.3;
      margin-top: 1.6rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    nav {
      margin-bottom: 1.2rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
    }
    nav > a {
      display: inline-block;
      margin-right: 1.15rem;
    }
    .breadcrumbs {
      font-size: 0.9em;
      margin-bottom: 1.2rem;
      color: var(--dim);
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    .breadcrumbs a { color: var(--text); }
    .breadcrumbs > * + *::before { content: " › "; color: var(--dim); }
  </style>
</head>
<body>
  <nav><a href="/rust-personal-site/">Home</a><a href="/rust-personal-site/about/index.html" style="font-weight: bold;">About</a><a href="/rust-personal-site/blog/index.html">Blog</a></nav>
  <div class="breadcrumbs"><a href="/rust-personal-site/">Home</a> <a href="/rust-personal-site/about/index.html">About</a> <span>Index</span></div>
  <h1>About</h1>
<p>Learn more about me and this site.</p>

</body>
</html>
